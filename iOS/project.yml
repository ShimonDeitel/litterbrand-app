name: Litterbrand
options:
  bundleIdPrefix: com.shimondeitel.petfoodlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Litterbrand:
    type: application
    platform: iOS
    sources:
      - path: Litterbrand
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.petfoodlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Litterbrand/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  LitterbrandTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LitterbrandTests
    dependencies:
      - target: Litterbrand
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.petfoodlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  LitterbrandUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: LitterbrandUITests
    dependencies:
      - target: Litterbrand
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.petfoodlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Litterbrand:
    build:
      targets:
        Litterbrand: all
        LitterbrandTests: [test]
        LitterbrandUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Litterbrand.storekit
    test:
      config: Debug
      storeKitConfiguration: Litterbrand.storekit
      targets:
        - LitterbrandTests
        - LitterbrandUITests
    archive:
      config: Release
